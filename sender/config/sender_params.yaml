/sender/hik_camera:
  ros__parameters:
    # 相机图像发布是否使用 sensor-data QoS。
    use_sensor_data_qos: true
    # 相机信息使用的 CameraInfo 名称。
    camera_name: "hik_camera"
    # 可选相机标定 URL，不使用时留空。
    camera_info_url: ""
    # 相机曝光时间，根据现场亮度和运动模糊调整。
    exposure_time: 12000.0
    # 相机模拟增益，越高越亮但噪声也越多。
    gain: 10.0
    # 海康相机采集和发布帧率，也是编码器使用的输入帧率。
    frame_rate: 30.0

/sender/video_encoder:
  ros__parameters:
    # 缩放前的中心裁剪尺寸。
    crop_size: 800
    # 编码输出图像的宽高。
    output_size: 300
    # 编码前是否强制转为灰度图。
    force_monochrome: false
    # 是否简化静态背景以降低码率。
    static_simplify: true
    # 运动检测阈值，越低越敏感。
    motion_threshold: 14
    # 运动 mask 腐蚀像素，用于去除小噪点。
    motion_erode_px: 2
    # 运动 mask 膨胀像素，用于保留附近细节。
    motion_dilate_px: 6
    # 保留运动拖影的历史帧数。
    motion_trail_frames: 15
    # 运动区域占比过高时禁用拖影。
    trail_disable_motion_ratio: 0.30
    # 背景模型更新速度。
    bg_update_alpha: 0.01
    # 背景模糊强度。
    bg_blur_sigma: 1.8
    # 中心区域保持清晰的方形尺寸。
    center_clear_size: 150

    # 编码器 x264 目标码率，单位 kbit/s。
    target_bitrate: 120
    # 编码器 x264 速度预设，越慢通常压缩效果越好但更吃 CPU。
    x264_preset: "ultrafast"

    # 是否显示 sender 端 OpenCV 预览窗口。
    enable_display: true

/sender/serial_sender:
  ros__parameters:
    # 是否向 /dev/ttyACM* 或 /dev/ttyUSB* 写入裁判帧。
    enabled: true
    # 串口发送线程每秒最多取出的完整裁判帧数量，最大为 50。
    max_rate_hz: 50.0
    # 完整裁判帧积压达到该数量时清空整个发送队列。
    max_backlog_frames: 50

/sender/mqtt_sender:
  ros__parameters:
    # 是否把裁判帧转发为 MQTT CustomByteBlock。
    enabled: true
    # MQTT publisher 连接地址。
    host: "127.0.0.1"
    # MQTT publisher 连接端口。
    port: 3333
    # MQTT protobuf 话题。
    topic: "CustomByteBlock"

/sender/mqtt_broker:
  ros__parameters:
    # 是否启动 sender 内置的 amqtt broker。
    enabled: true
    # 内置 broker 监听地址。
    host: "127.0.0.1"
    # 内置 broker 监听端口。
    port: 3333
