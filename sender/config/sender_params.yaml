sender_runtime:
  ros__parameters:
    # 是否向 /dev/ttyACM* 或 /dev/ttyUSB* 写入 0x0310 裁判帧。
    enable_serial: true
    # 是否把同一份 0x0310 帧转发到本地 MQTT 测试链路。
    enable_local_test: true
    # 是否启动内置 MQTT broker，供 receiver 本地测试连接。
    local_test_start_broker: true
    # 本地测试 MQTT 绑定和连接地址。
    local_test_mqtt_host: "127.0.0.1"
    # 本地测试 MQTT 端口。
    local_test_mqtt_port: 3333
    # 本地测试 MQTT protobuf 话题。
    local_test_mqtt_topic: "CustomByteBlock"

hik_camera:
  ros__parameters:
    # 相机图像发布是否使用 sensor-data QoS。
    use_sensor_data_qos: true
    # 相机曝光时间，根据现场亮度和运动模糊调整。
    exposure_time: 12000.0
    # 相机模拟增益，越高越亮但噪声也越多。
    gain: 10.0
    # 相机信息使用的 CameraInfo 名称。
    camera_name: "hik_camera"
    # 可选相机标定 URL，不使用时留空。
    camera_info_url: ""

video_encoder:
  ros__parameters:
    # 编码器订阅的相机图像话题。
    input_topic: "/image_raw"
    # 可选 Pacific 旧解码器兼容话题。
    video_stream_topic: "/video_stream"

    # 缩放前的中心裁剪尺寸。
    crop_size: 800
    # 编码输出图像的宽高。
    output_size: 300
    # 每秒送入 x264 的帧数。
    output_fps: 60
    # 编码器 x264 目标码率，单位 kbit/s。
    target_bitrate: 80
    # 编码器 x264 速度预设，越慢通常压缩效果越好但更吃 CPU。
    x264_preset: "veryslow"
    # 是否启用可选的 /video_stream 兼容发布。
    enable_video_stream: true

    # 是否简化静态背景以降低码率。
    static_simplify: true
    # 运动检测阈值，越低越敏感。
    motion_threshold: 14
    # 运动 mask 腐蚀像素，用于去除小噪点。
    motion_erode_px: 2
    # 运动 mask 膨胀像素，用于保留附近细节。
    motion_dilate_px: 6
    # 保留运动拖影的历史帧数。
    motion_trail_frames: 15
    # 运动区域占比过高时禁用拖影。
    trail_disable_motion_ratio: 0.30
    # 背景模型更新速度。
    bg_update_alpha: 0.01
    # 背景模糊强度。
    bg_blur_sigma: 1.8
    # 中心区域保持清晰的方形尺寸。
    center_clear_size: 150
    # 编码前是否强制转为灰度图。
    force_monochrome: false

    # /video_stream 兼容链路限速，单位 kB/s。
    bandwidth_limit_kbytes: 14.0
    # /video_stream 限速统计窗口，单位秒。
    bandwidth_window_s: 2.0
    # 0x0310 串口和本地测试链路最大发包率。
    serial_max_rate_hz: 50.0
    # 编码 backlog 最大延迟，超过后丢弃旧 H264 数据。
    max_tx_delay_s: 1.0

    # 是否显示 sender 端 OpenCV 预览窗口。
    enable_display: true
