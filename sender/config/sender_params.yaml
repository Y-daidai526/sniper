sender_runtime:
  ros__parameters:
    enable_serial: true
    enable_debug_bridge: true
    debug_start_broker: true
    debug_mqtt_host: "127.0.0.1"
    debug_mqtt_port: 3333
    debug_mqtt_topic: "CustomByteBlock"
    debug_script_dir: ""

hik_camera:
  ros__parameters:
    image_topic: "image_raw"
    frame_id: "camera_optical_frame"
    camera_name: "narrow_stereo"
    use_sensor_data_qos: true
    acquisition_frame_rate: 250.0
    exposure_time: 12000.0
    gain: 10.0
    color_transformation_enable: true
    gamma: 7.5
    ccm_enable: false
    camera_info_url: ""

video_encoder:
  ros__parameters:
    input_topic: "/image_raw"
    video_stream_topic: "/video_stream"

    crop_size: 800
    output_size: 300
    output_fps: 60
    target_bitrate: 80
    x264_preset: "veryslow"
    enable_video_stream: true

    static_simplify: true
    motion_threshold: 14
    motion_erode_px: 2
    motion_dilate_px: 6
    motion_trail_frames: 90
    trail_disable_motion_ratio: 0.30
    bg_update_alpha: 0.01
    bg_blur_sigma: 1.8
    center_clear_size: 150
    force_monochrome: false

    serial_max_rate_hz: 50.0
    max_tx_delay_s: 1.0

    enable_display: true
    debug_dump_enable: false
    debug_dump_every_n_frames: 20
    debug_dump_save_raw: false
    debug_dump_save_roi: true
    debug_dump_save_static: false
    debug_dump_save_final: true
    debug_dump_dir: "sniper_debug_imgs"
