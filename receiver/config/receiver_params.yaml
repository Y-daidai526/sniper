/receiver/mqtt_receiver:
  ros__parameters:
    # 消息服务器 MQTT broker 地址。
    broker_host: "192.168.12.1"
    # 消息服务器 MQTT broker 端口。
    broker_port: 3333
    # 消息体 Protobuf CustomByteBlock 话题。
    topic: "CustomByteBlock"

/receiver/video_decoder:
  ros__parameters:
    # 编码数据 ROS 订阅队列长度，积压时由 ROS 丢弃旧消息。
    queue_size: 1000
    # 是否显示 OpenCV 接收画面窗口。
    display: true
    # 解码后 300x300 图像的显示放大倍率。
    display_scale: 3
    # 准星水平偏移，单位为显示后的像素。
    crosshair_offset_x: 0
    # 准星垂直偏移，单位为显示后的像素。
    crosshair_offset_y: 0
    # 准星线宽。
    crosshair_width: 1
